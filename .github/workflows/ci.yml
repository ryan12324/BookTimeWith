name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - name: Check migration drift
        run: |
          npm run db:generate
          test -z "$(git status --porcelain -- drizzle)"
      - name: Audit production dependencies
        run: npm audit --omit=dev

  release-image:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: check
    steps:
      - uses: actions/checkout@v4
      - name: Build production image
        run: docker build --tag booktimewith:ci .
