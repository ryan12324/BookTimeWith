name: booktimewith-dev

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: booktimewith
      POSTGRES_USER: booktimewith
      POSTGRES_PASSWORD: booktimewith
    ports:
      - "127.0.0.1:${DEV_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booktimewith -d booktimewith"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  app:
    image: node:22-alpine
    init: true
    working_dir: /app
    command: >-
      sh -c "npm ci --no-audit --no-fund &&
      npm run dev -- --hostname 0.0.0.0"
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://booktimewith:booktimewith@db:5432/booktimewith
      DATABASE_POOL_MAX: "5"
      AUTH_TOKEN_SECRET: dev-only-auth-token-secret-change-in-production
      CRON_SECRET: dev-only-cron-secret-change-in-production
      RATE_LIMIT_SECRET: dev-only-rate-limit-secret-change-in-production
      CALENDAR_TOKEN_SECRET: dev-only-calendar-secret-change-in-production
      APP_URL: http://localhost:${DEV_APP_PORT:-3000}
      BOOKING_URL: http://localhost:${DEV_APP_PORT:-3000}
      TRUST_PROXY_HEADERS: "false"
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
    ports:
      - "127.0.0.1:${DEV_APP_PORT:-3000}:3000"
    volumes:
      - .:/app
      - node-modules:/app/node_modules
      - next-cache:/app/.next
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

volumes:
  postgres-data:
  node-modules:
  next-cache:
